services:
  # Backend API
  - type: web
    name: valley-verde-backend
    runtime: python
    buildCommand: pip install --no-cache-dir -r backend/requirements.txt
    startCommand: cd backend && gunicorn app:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 90 --max-requests 300 --max-requests-jitter 30 --worker-tmp-dir /dev/shm --keep-alive 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: WEB_CONCURRENCY
        value: 1
      - key: WORKER_CLASS
        value: uvicorn.workers.UvicornWorker
      - key: MALLOC_ARENA_MAX
        value: 2
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SPREADSHEET_ID
        sync: false
      - key: SHEETS_RANGE
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
    plan: free
    autoDeploy: true
    healthCheckPath: /api/summary
