services:
  # Backend API
  - type: web
    name: valley-verde-backend
    runtime: python
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120 --max-requests 1000 --max-requests-jitter 50
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SPREADSHEET_ID
        sync: false
      - key: SHEETS_RANGE
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
    plan: free
    autoDeploy: true
    healthCheckPath: /api/summary
    
  # Frontend Static Site
  - type: web
    name: valley-verde-frontend
    runtime: node
    buildCommand: cd frontend && npm install --legacy-peer-deps && NODE_OPTIONS='--max-old-space-size=2048' npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        sync: false
    plan: free
    autoDeploy: true
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
